<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>egonets</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load revisit-communicate to be able to send data to reVISit -->
    <script src="../../../revisitUtilities/revisit-communicate.js"></script>
</head>

<body>
</body>

<script type="module">
    import { ego_init } from './src/js/main_revist.js';

    Revisit.onDataReceive((data) => {
        console.log(data);

        let options = {};
        if (data.graphDataPath) {
            // note the path must be relative to 'main_revisit.js'
            // e.g. "./data/star_wars_4_adapted.edges.json"
            options.dataPath = data.graphDataPath;
        }

        if (data.visualizationStyle) {
            let vs = data.visualizationStyle;
            if (vs === "biofabric") {
                options.rendererType = "biofabric";
            } else if (vs === "matrix") {
                options.rendererType = "matrix";
            } else if (vs === "force") {
                options.rendererType = "nodelink";
                options.layoutType = "force";
            } else if (vs === "layered") {
                options.rendererType = "nodelink";
                options.layoutType = "layered";
            } else {
                throw Error(`Unknown visualization style sent with revist parameters: ${vs}`);
            }
        }

        ego_init(options);
    });
</script>

</html>
