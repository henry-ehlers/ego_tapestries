<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🧬</text></svg>">
    <title>Ego Tapestries</title>
    <style>
        .nodetext {
            font-size: 2pt;
            font-family: "Arial"
        }

        .highlight {
            stroke: gold;
            stroke-width: 0.1px;
        }

        .highlight-matrix {
            fill: gold;
        }

        .fade-matrix {
            opacity: 0.3;
        }

        .fade-nodelink-node {
            opacity: 0.5;
        }

        .fade-nodelink-link {
            stroke: color-mix(in srgb, #ffffff50, currentColor 30%);
        }
    </style>
</head>

<body>
    <div>
        <button class="view-button" id="biofabric">BioFabric</button>
        <button class="view-button" id="nodelink-force">NodeLink Force</button>
        <button class="view-button" id="nodelink-radial">NodeLink Radial</button>
        <button class="view-button" id="nodelink-layered">NodeLink Layered</button>
        <button class="view-button" id="matrix">Matrix</button>
    </div>
    <a href="multiple.html">Show visualizations side by side</a>
</body>

<script type="module">
    import { setRenderType, setLayoutType } from "./src/js/main.js";

    const buttons = [...document.querySelectorAll(".view-button")];

    buttons.forEach(btn => {
        btn.addEventListener("click", () => {
            const btnid = btn.id;
            if (btnid === "biofabric") {
                setRenderType("biofabric");
            } else if (btnid === "matrix") {
                setRenderType("matrix");
            } else if (btnid === "nodelink-force") {
                setRenderType("nodelink");
                setLayoutType("force");
            } else if (btnid === "nodelink-radial") {
                setRenderType("nodelink");
                setLayoutType("radial");
            } else if (btnid === "nodelink-layered") {
                setRenderType("nodelink");
                setLayoutType("layered");
            }
        });
    });
</script>

</html>
