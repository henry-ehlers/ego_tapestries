<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🧬</text></svg>">
    <title>Ego Tapestries</title>
    <style>
        body {
            font-family: "Arial"
        }

        .nodetext {
            font-size: 2pt;
            font-family: "Arial"
        }

        .highlight {
            stroke: gold;
            stroke-width: 0.2px;
        }

        .highlight-matrix {
            fill: gold;
        }

        .fade-matrix {
            opacity: 0.3;
        }

        .fade-nodelink-node {
            opacity: 0.3;
        }

        .fade-nodelink-link {
            stroke: color-mix(in srgb, #ffffff50, currentColor 30%);
        }

        .fade-biofabric {
            opacity: 0.3;
        }

        .highlight-biofabric {
            stroke: gold;
            stroke-width: 0.2px;
        }
    </style>
</head>

<body>

    <div style="display:grid; grid-template-columns:repeat(6, 1fr); box-sizing:border-box; gap:0; overflow:hidden;">
        <div style="border:1px solid #ccc; box-sizing:border-box; grid-column:span 3;">
            <svg id="biofabric-svg" viewBox="0 0 100 50" width="100%" height="100%" preserveAspectRatio="none"></svg>
        </div>

        <div style="border:1px solid #ccc; box-sizing:border-box; grid-column:span 3;">
            <svg id="matrix-svg" viewBox="0 0 100 50" width="100%" height="100%" preserveAspectRatio="none"></svg>
        </div>

        <div style="border:1px solid #ccc; box-sizing:border-box; grid-column:span 2;">
            <svg id="force-svg" viewBox="0 0 100 90" width="100%" height="100%" preserveAspectRatio="none"></svg>
        </div>

        <div style="border:1px solid #ccc; box-sizing:border-box; grid-column:span 2;">
            <svg id="radial-svg" viewBox="0 0 100 90" width="100%" height="100%" preserveAspectRatio="none"></svg>
        </div>

        <div style="border:1px solid #ccc; box-sizing:border-box; grid-column:span 2;">
            <svg id="layered-svg" viewBox="0 0 100 90" width="100%" height="100%" preserveAspectRatio="none"></svg>
        </div>
    </div>

</body>

<script type="module">
    import { } from "./src/js/multiple.js";
</script>

</html>
